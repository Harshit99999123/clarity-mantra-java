spring.datasource.url=jdbc:h2:mem:clarity;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.hikari.pool-name=test-hikari
spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.keepalive-time=0
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.validation-timeout=2000
spring.datasource.hikari.initialization-fail-timeout=1
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false
spring.transaction.default-timeout=30s
spring.mvc.problemdetails.enabled=true
clarity.security.jwt-secret=12345678901234567890123456789012
clarity.security.jwt-expiration-minutes=60
clarity.google.client-ids=test-client-id.apps.googleusercontent.com
clarity.ai.base-url=http://localhost:8000
clarity.ai.connect-timeout-seconds=5
clarity.ai.read-timeout-seconds=30
clarity.ai.resilience.max-attempts=2
clarity.ai.resilience.initial-backoff-millis=10
clarity.ai.resilience.max-backoff-millis=20
clarity.ai.resilience.jitter-factor=0.1
clarity.ai.resilience.circuit-failure-threshold=2
clarity.ai.resilience.circuit-open-millis=100
JPA_DDL_AUTO=create-drop
DB_TRANSACTION_TIMEOUT=30s
SERVER_TOMCAT_MAX_THREADS=20
SERVER_TOMCAT_MIN_SPARE_THREADS=2
SERVER_TOMCAT_ACCEPT_COUNT=10
SERVER_TOMCAT_CONNECTION_TIMEOUT_MILLIS=5000
APP_SHUTDOWN_TIMEOUT=5s
