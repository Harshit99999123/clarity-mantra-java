spring.application.name=clarity-mantra-core
spring.config.import=optional:file:.env[.properties]

server.servlet.context-path=/api/v1
server.shutdown=graceful
server.tomcat.threads.max=${SERVER_TOMCAT_MAX_THREADS}
server.tomcat.threads.min-spare=${SERVER_TOMCAT_MIN_SPARE_THREADS}
server.tomcat.accept-count=${SERVER_TOMCAT_ACCEPT_COUNT}
server.tomcat.connection-timeout=${SERVER_TOMCAT_CONNECTION_TIMEOUT_MILLIS}
server.compression.enabled=true
server.compression.mime-types=application/json,text/event-stream,text/plain,text/html,text/xml,text/css,application/javascript
server.forward-headers-strategy=framework
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
spring.lifecycle.timeout-per-shutdown-phase=${APP_SHUTDOWN_TIMEOUT}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.pool-name=${DB_POOL_NAME}
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT_MILLIS}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME_MILLIS}
spring.datasource.hikari.keepalive-time=${DB_KEEPALIVE_TIME_MILLIS}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MILLIS}
spring.datasource.hikari.validation-timeout=${DB_VALIDATION_TIMEOUT_MILLIS}
spring.datasource.hikari.initialization-fail-timeout=${DB_INITIALIZATION_FAIL_TIMEOUT_MILLIS}
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.register-mbeans=true
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
spring.datasource.hikari.data-source-properties.useServerPrepStmts=true
spring.datasource.hikari.data-source-properties.rewriteBatchedStatements=true
spring.datasource.hikari.data-source-properties.maintainTimeStats=false

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true
spring.transaction.default-timeout=${DB_TRANSACTION_TIMEOUT}
spring.mvc.problemdetails.enabled=true

clarity.security.jwt-secret=${JWT_SECRET}
clarity.security.jwt-expiration-minutes=${JWT_EXPIRATION_MINUTES}
clarity.google.client-ids=${GOOGLE_CLIENT_IDS}
clarity.ai.base-url=${AI_SERVICE_BASE_URL}
clarity.ai.connect-timeout-seconds=${AI_CONNECT_TIMEOUT_SECONDS}
clarity.ai.read-timeout-seconds=${AI_READ_TIMEOUT_SECONDS}
clarity.ai.resilience.max-attempts=${AI_MAX_ATTEMPTS}
clarity.ai.resilience.initial-backoff-millis=${AI_INITIAL_BACKOFF_MILLIS}
clarity.ai.resilience.max-backoff-millis=${AI_MAX_BACKOFF_MILLIS}
clarity.ai.resilience.jitter-factor=${AI_JITTER_FACTOR}
clarity.ai.resilience.circuit-failure-threshold=${AI_CIRCUIT_FAILURE_THRESHOLD}
clarity.ai.resilience.circuit-open-millis=${AI_CIRCUIT_OPEN_MILLIS}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.show-components=never
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.info.env.enabled=false
